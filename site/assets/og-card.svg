<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Honeypot Med — prompt-injection proof pages for healthcare AI">
  <defs>
    <linearGradient id="bgDark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e131c"/>
      <stop offset="62%" stop-color="#1f120c"/>
      <stop offset="100%" stop-color="#0c1217"/>
    </linearGradient>
    <radialGradient id="glowAccent" cx="0.18" cy="0.28" r="0.45">
      <stop offset="0%" stop-color="#c6432a" stop-opacity="0.62"/>
      <stop offset="100%" stop-color="#c6432a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowTeal" cx="0.86" cy="0.16" r="0.42">
      <stop offset="0%" stop-color="#1f5f56" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#1f5f56" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowBottom" cx="0.92" cy="0.92" r="0.42">
      <stop offset="0%" stop-color="#fff5e6" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#fff5e6" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" x="0" y="0" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M 56 0 L 0 0 0 56" fill="none" stroke="#fffaf4" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
    <mask id="gridMask">
      <radialGradient id="gridFade" cx="0.5" cy="0.5" r="0.6">
        <stop offset="0%" stop-color="#fff" stop-opacity="0.7"/>
        <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
      </radialGradient>
      <rect width="1200" height="630" fill="url(#gridFade)"/>
    </mask>
  </defs>

  <rect width="1200" height="630" fill="url(#bgDark)"/>
  <rect width="1200" height="630" fill="url(#glowAccent)"/>
  <rect width="1200" height="630" fill="url(#glowTeal)"/>
  <rect width="1200" height="630" fill="url(#glowBottom)"/>
  <rect width="1200" height="630" fill="url(#grid)" mask="url(#gridMask)"/>

  <!-- Brand chip -->
  <g transform="translate(72, 72)">
    <rect width="44" height="44" rx="12" fill="#14181f" stroke="#fffaf4" stroke-opacity="0.18"/>
    <rect x="6" y="6" width="32" height="32" rx="8" fill="none" stroke="#fffaf4" stroke-opacity="0.18"/>
    <text x="22" y="29" text-anchor="middle" font-family="Fraunces, Iowan Old Style, Georgia, serif" font-size="16" font-weight="700" fill="#fffaf4">HM</text>
    <text x="60" y="20" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-size="11" font-weight="700" fill="#fffaf4" fill-opacity="0.92" letter-spacing="3.5">HONEYPOT MED</text>
    <text x="60" y="38" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-size="13" fill="#fffaf4" fill-opacity="0.55">Prompt-injection evidence for healthcare AI</text>
  </g>

  <!-- Status pill (top-right) -->
  <g transform="translate(932, 80)">
    <rect width="196" height="36" rx="18" fill="#c6432a" fill-opacity="0.16" stroke="#c6432a" stroke-opacity="0.5"/>
    <circle cx="20" cy="18" r="5" fill="#ff6b4a"/>
    <text x="36" y="23" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-size="12" font-weight="700" fill="#ff6b4a" letter-spacing="2.2">10 TRAPS · BLOCKED</text>
  </g>

  <!-- Headline -->
  <text x="72" y="266" font-family="Fraunces, Iowan Old Style, Georgia, serif" font-size="84" font-weight="600" fill="#fffaf4" letter-spacing="-3">Healthcare AI prompts</text>
  <text x="72" y="356" font-family="Fraunces, Iowan Old Style, Georgia, serif" font-size="84" font-weight="600" fill="#fffaf4" letter-spacing="-3">get proof people can read.</text>

  <!-- Subline -->
  <text x="72" y="416" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-size="22" fill="#fffaf4" fill-opacity="0.62" letter-spacing="-0.2">Local-first · open source · zero API keys</text>

  <!-- Run path card -->
  <g transform="translate(72, 466)">
    <rect width="332" height="100" rx="20" fill="#fffaf4" fill-opacity="0.06" stroke="#fffaf4" stroke-opacity="0.18"/>
    <text x="22" y="34" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-size="11" font-weight="700" fill="#fffaf4" fill-opacity="0.5" letter-spacing="2.5">RUN PATH</text>
    <text x="22" y="76" font-family="JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="26" font-weight="500" fill="#ff8866">python app.py challenge</text>
  </g>

  <!-- Exports card -->
  <g transform="translate(424, 466)">
    <rect width="332" height="100" rx="20" fill="#fffaf4" fill-opacity="0.06" stroke="#fffaf4" stroke-opacity="0.18"/>
    <text x="22" y="34" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-size="11" font-weight="700" fill="#fffaf4" fill-opacity="0.5" letter-spacing="2.5">EXPORTS</text>
    <text x="22" y="76" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-size="22" font-weight="600" fill="#fffaf4">Dossier · PDF · UI · SARIF</text>
  </g>

  <!-- Domain ribbon -->
  <g transform="translate(776, 466)">
    <rect width="352" height="100" rx="20" fill="#1f5f56" fill-opacity="0.16" stroke="#1f5f56" stroke-opacity="0.42"/>
    <text x="22" y="34" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-size="11" font-weight="700" fill="#7fdbcb" letter-spacing="2.5">SHIPS WITH</text>
    <text x="22" y="76" font-family="Fraunces, Iowan Old Style, Georgia, serif" font-size="22" font-weight="600" fill="#fffaf4">10 traps · 6 packs · 1 verdict</text>
  </g>

  <!-- Footer link -->
  <text x="600" y="600" text-anchor="middle" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-size="14" fill="#fffaf4" fill-opacity="0.5" letter-spacing="0.5">byteworthyllc.github.io/honeypot-med</text>
</svg>
