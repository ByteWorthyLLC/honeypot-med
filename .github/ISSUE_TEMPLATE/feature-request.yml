name: Feature request
description: Propose a product or platform improvement.
title: "[feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem or workflow gap does this address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the solution you want.
    validations:
      required: true
  - type: textarea
    id: proof
    attributes:
      label: Why this matters
      description: Explain the practical or strategic value.

