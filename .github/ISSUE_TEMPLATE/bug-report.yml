name: Bug report
description: Report a product, packaging, or runtime defect.
title: "[bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the problem and the expected behavior.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include exact commands, inputs, or clicks needed to reproduce.
      placeholder: |
        python app.py share --pack claims --outdir reports/share
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, packaged binary or source install, and any Docker context.
    validations:
      required: true

