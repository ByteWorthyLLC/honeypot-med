name: ci

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Bytecode compile
        run: python -m compileall -q app.py src/honeypot_med
      - name: Run tests
        run: python -m unittest discover -s tests -p 'test_*.py'
      - name: Share bundle smoke
        run: python app.py share --pack claims --outdir reports-ci/share
      - name: Security advisory replay
        run: |
          if python app.py replay --store examples/replay-fixture.jsonl --strict --pretty; then
            echo "Replay gate passed."
          else
            echo "Replay gate intentionally non-blocking in CI; continuing after advisory replay."
          fi
      - name: Run security gate baseline
        if: runner.os != 'Windows'
        run: scripts/security/honeypot-gate.sh examples/clean.json
