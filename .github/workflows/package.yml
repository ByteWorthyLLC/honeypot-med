name: package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          chmod +x scripts/package/build-linux.sh
          scripts/package/build-linux.sh
      - name: Smoke packaged binary (Linux)
        if: runner.os == 'Linux'
        run: ./dist/honeypot-med packs --json

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          chmod +x scripts/package/build-macos.sh
          scripts/package/build-macos.sh
      - name: Smoke packaged binary (macOS)
        if: runner.os == 'macOS'
        run: ./dist/honeypot-med packs --json

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          ./scripts/package/build-windows.ps1
      - name: Smoke packaged binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          ./dist/honeypot-med.exe packs --json

      - name: Generate release manifest
        run: python scripts/release/generate-manifest.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: honeypot-med-${{ runner.os }}
          path: dist/
          if-no-files-found: error

  publish-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - uses: actions/download-artifact@v7
        with:
          path: release-assets

      - name: Assemble release assets
        run: |
          rm -rf dist
          mkdir -p dist/linux dist/macos dist/windows
          cp -R release-assets/honeypot-med-Linux/. dist/linux/
          cp -R release-assets/honeypot-med-macOS/. dist/macos/
          cp -R release-assets/honeypot-med-Windows/. dist/windows/
          python scripts/release/generate-manifest.py --dist-dir dist

      - name: Build release notes
        run: |
          cat > RELEASE_NOTES.md <<EOF
          # Honeypot Med ${GITHUB_REF_NAME}

          Prompt-injection evidence for healthcare AI with a zero-key local-first path.

          ## Fast paths

          - Public site: https://byteworthyllc.github.io/honeypot-med/
          - Releases page: https://byteworthyllc.github.io/honeypot-med/releases/
          - GitHub repo: https://github.com/ByteWorthyLLC/honeypot-med

          ## Quickstart

          \`\`\`bash
          python app.py
          \`\`\`

          ## Bootstrap installers

          macOS / Linux:

          \`\`\`bash
          curl -fsSL https://raw.githubusercontent.com/ByteWorthyLLC/honeypot-med/main/scripts/bootstrap/install.sh | bash
          \`\`\`

          Windows:

          \`\`\`powershell
          powershell -ExecutionPolicy Bypass -Command "iwr https://raw.githubusercontent.com/ByteWorthyLLC/honeypot-med/main/scripts/bootstrap/install.ps1 -UseBasicParsing | iex"
          \`\`\`
          EOF

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Honeypot Med ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          fail_on_unmatched_files: true
          files: |
            dist/SHA256SUMS.txt
            dist/release-manifest.json
            dist/linux/*
            dist/macos/*
            dist/windows/*
